name: middle-server-release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. Pre_0.0.1)"
        required: true
        default: "Pre_0.0.1"
      version_code:
        description: "Version code (integer)"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            output_id: linux-x64
            is_windows: false
          - rid: linux-arm64
            output_id: linux-arm64
            is_windows: false
          - rid: win-x64
            output_id: windows-x64
            is_windows: true
          - rid: win-arm64
            output_id: windows-arm64
            is_windows: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore middle_server/RemoteMessage.MiddleServer.csproj

      - name: Publish (${{ matrix.rid }})
        run: >-
          dotnet publish middle_server/RemoteMessage.MiddleServer.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:IncludeAllContentForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:PublishTrimmed=false
          /p:DebugType=embedded
          -o artifacts/middle-server/${{ matrix.output_id }}

      - name: Normalize single-file output (${{ matrix.rid }})
        shell: bash
        run: |
          set -euo pipefail
          out_dir="artifacts/middle-server/${{ matrix.output_id }}"

          if [[ "${{ matrix.is_windows }}" == "true" ]]; then
            source_file="$out_dir/RemoteMessage.MiddleServer.exe"
            target_file="$out_dir/RemoteMessageServer-${{ matrix.output_id }}-${{ inputs.version_name }}-${{ inputs.version_code }}.exe"
          else
            source_file="$out_dir/RemoteMessage.MiddleServer"
            target_file="$out_dir/RemoteMessageServer-${{ matrix.output_id }}-${{ inputs.version_name }}-${{ inputs.version_code }}"
          fi

          if [[ ! -f "$source_file" ]]; then
            echo "::error::Expected publish binary not found: $source_file"
            ls -la "$out_dir"
            exit 1
          fi

          mv "$source_file" "$target_file"

          shopt -s dotglob nullglob
          for item in "$out_dir"/*; do
            if [[ "$item" != "$target_file" ]]; then
              rm -rf "$item"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-middle-server-${{ matrix.output_id }}
          path: artifacts/middle-server/${{ matrix.output_id }}/*

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-and-pack]
    steps:
      - name: Download all build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_name }}
          name: ${{ inputs.version_name }}
          prerelease: true
          append_body: true
          body: |
            - Middle server release
            - Version code: ${{ inputs.version_code }}
          files: |
            release-assets/**/*
          fail_on_unmatched_files: true
