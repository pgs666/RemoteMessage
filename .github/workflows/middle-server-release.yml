name: middle-server-release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. Pre_0.0.1)"
        required: true
        default: "Pre_0.0.1"
      version_code:
        description: "Version code (integer)"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  build-and-pack:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output_id: linux-x64
            exe_suffix: ""
          - os: windows-latest
            output_id: windows-x64
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (${{ matrix.output_id }})
        run: cargo build --release --manifest-path middle_server_rust/Cargo.toml

      - name: Normalize release output (${{ matrix.output_id }})
        shell: bash
        run: |
          set -euo pipefail
          out_dir="artifacts/middle-server/${{ matrix.output_id }}"
          source_file="middle_server_rust/target/release/remote_message_middle_server${{ matrix.exe_suffix }}"
          target_file="$out_dir/RemoteMessageServer-${{ matrix.output_id }}-${{ inputs.version_name }}-${{ inputs.version_code }}${{ matrix.exe_suffix }}"

          if [[ ! -f "$source_file" ]]; then
            echo "::error::Expected build binary not found: $source_file"
            ls -la "middle_server_rust/target/release" || true
            exit 1
          fi

          mkdir -p "$out_dir"
          cp "$source_file" "$target_file"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-middle-server-${{ matrix.output_id }}
          path: artifacts/middle-server/${{ matrix.output_id }}/*

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-and-pack]
    steps:
      - name: Download all build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_name }}
          name: ${{ inputs.version_name }}
          prerelease: true
          append_body: false
          overwrite_files: true
          body: |
            - Middle server release
            - Version code: ${{ inputs.version_code }}
          files: |
            release-assets/**/*
          fail_on_unmatched_files: true
