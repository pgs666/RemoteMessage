name: middle-server-debug-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-and-publish:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            output_id: linux-x64
            exe_suffix: ""
          - os: windows-latest
            output_id: windows-x64
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build (${{ matrix.output_id }})
        run: cargo build --release --manifest-path middle_server_rust/Cargo.toml

      - name: Normalize output (${{ matrix.output_id }})
        shell: bash
        run: |
          set -euo pipefail
          out_dir="artifacts/middle-server/${{ matrix.output_id }}"
          source_file="middle_server_rust/target/release/remote_message_middle_server${{ matrix.exe_suffix }}"
          target_file="$out_dir/RemoteMessageServer-${{ matrix.output_id }}${{ matrix.exe_suffix }}"

          if [[ ! -f "$source_file" ]]; then
            echo "::error::Expected build binary not found: $source_file"
            ls -la "middle_server_rust/target/release" || true
            exit 1
          fi

          mkdir -p "$out_dir"
          cp "$source_file" "$target_file"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: middle-server-${{ matrix.output_id }}
          path: artifacts/middle-server/${{ matrix.output_id }}
