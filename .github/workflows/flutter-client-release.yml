name: flutter-client-release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. Pre_0.0.1)"
        required: true
        default: "Pre_0.0.1"
      version_code:
        description: "Version code (integer)"
        required: true
        default: "1"

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            flutter_arch: x64
            deb_arch: amd64
            rpm_arch: x86_64
            appimagetool_url: https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          - arch: arm64
            runner: ubuntu-24.04-arm
            flutter_arch: arm64
            deb_arch: arm64
            rpm_arch: aarch64
            appimagetool_url: https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Flutter SDK
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/flutter/bin:$PATH"
          flutter --version

      - name: Install Linux build and packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libsecret-1-dev libjsoncpp-dev ruby ruby-dev build-essential rpm
          sudo gem install --no-document fpm

      - name: Create Flutter app skeleton
        run: flutter create --project-name remotemessage --platforms=linux client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts flutter_secure_storage image zxing2 mobile_scanner

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Configure client app identity
        run: python client/configure_client_app_identity.py client/flutter_client_build

      - name: Build Linux
        working-directory: client/flutter_client_build
        run: flutter build linux --release

      - name: Pack Linux portable and native packages
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="client/flutter_client_build/build/linux/${{ matrix.flutter_arch }}/release/bundle"
          if [ ! -d "$bundle_dir" ]; then
            echo "::error::Bundle dir not found: $bundle_dir"
            ls -R client/flutter_client_build/build/linux || true
            exit 1
          fi

          mkdir -p release-assets/linux

          # Keep portable tarball
          tar -C "$(dirname "$bundle_dir")" -czf "release-assets/linux/RemoteMessageClient-linux-${{ matrix.arch }}-${{ inputs.version_name }}-${{ inputs.version_code }}.tar.gz" bundle

          # Native version should avoid '_' for rpm/deb internals
          pkg_version="$(echo "${{ inputs.version_name }}" | tr -cd '0-9A-Za-z.')"
          if [ -z "$pkg_version" ]; then
            pkg_version="0.0.1"
          fi

          fpm -s dir -t deb \
            -n remotemessage-client \
            -v "$pkg_version" \
            --iteration "${{ inputs.version_code }}" \
            --architecture "${{ matrix.deb_arch }}" \
            --description "RemoteMessage desktop client" \
            --maintainer "RemoteMessage" \
            --prefix /opt/RemoteMessageClient \
            -C "$bundle_dir" \
            -p "release-assets/linux/RemoteMessageClient-linux-${{ matrix.arch }}-${{ inputs.version_name }}-${{ inputs.version_code }}.deb" \
            .

          fpm -s dir -t rpm \
            -n remotemessage-client \
            -v "$pkg_version" \
            --iteration "${{ inputs.version_code }}" \
            --architecture "${{ matrix.rpm_arch }}" \
            --description "RemoteMessage desktop client" \
            --maintainer "RemoteMessage" \
            --prefix /opt/RemoteMessageClient \
            -C "$bundle_dir" \
            -p "release-assets/linux/RemoteMessageClient-linux-${{ matrix.arch }}-${{ inputs.version_name }}-${{ inputs.version_code }}.rpm" \
            .

          # AppImage
          exec_path="$(find "$bundle_dir" -maxdepth 1 -type f -executable | head -n1 || true)"
          if [ -z "$exec_path" ]; then
            echo "::error::Cannot find executable in bundle root"
            find "$bundle_dir" -maxdepth 2 -type f | sed 's/^/  /'
            exit 1
          fi
          exec_name="$(basename "$exec_path")"

          appdir="appdir-${{ matrix.arch }}"
          rm -rf "$appdir"
          mkdir -p "$appdir"
          cp -R "$bundle_dir"/. "$appdir"/

          printf '%s\n' \
            '#!/bin/sh' \
            'HERE="$(dirname "$(readlink -f "$0")")"' \
            "exec \"\$HERE/$exec_name\" \"\$@\"" \
            > "$appdir/AppRun"
          chmod +x "$appdir/AppRun"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Type=Application' \
            'Name=RemoteMessage' \
            'Comment=RemoteMessage desktop client' \
            "Exec=$exec_name" \
            'Icon=remotemessage' \
            'Categories=Network;' \
            'Terminal=false' \
            > "$appdir/remotemessage.desktop"

          cp client/icons/Icon12-iOS-Default-1024x1024@1x.png "$appdir/remotemessage.png"

          curl -L "${{ matrix.appimagetool_url }}" -o appimagetool
          chmod +x appimagetool
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$appdir" "release-assets/linux/RemoteMessageClient-linux-${{ matrix.arch }}-${{ inputs.version_name }}-${{ inputs.version_code }}.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux-client-${{ matrix.arch }}
          path: release-assets/linux/*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --project-name remotemessage --platforms=windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts flutter_secure_storage image zxing2 mobile_scanner

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: pwsh
        run: |
          Remove-Item -LiteralPath client/flutter_client_build/lib -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path client/flutter_client_build/lib -Force | Out-Null
          Copy-Item -Path client/flutter_client_source/lib/* -Destination client/flutter_client_build/lib -Recurse -Force

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Configure client app identity
        run: python client/configure_client_app_identity.py client/flutter_client_build

      - name: Build Windows
        working-directory: client/flutter_client_build
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Pack Windows zip and installer
        shell: pwsh
        run: |
          $versionName = "${{ inputs.version_name }}"
          $versionCode = "${{ inputs.version_code }}"
          New-Item -ItemType Directory -Path release-assets/windows -Force | Out-Null

          $zipAsset = "RemoteMessageClient-windows-x64-$versionName-$versionCode.zip"
          Compress-Archive -Path client/flutter_client_build/build/windows/x64/runner/Release/* -DestinationPath $zipAsset -Force
          Move-Item -Path $zipAsset -Destination "release-assets/windows/$zipAsset" -Force

          $issPath = "client/flutter_client_build/windows_installer.iss"
          $releaseDir = Resolve-Path client/flutter_client_build/build/windows/x64/runner/Release
          $outputDir = Resolve-Path release-assets/windows
          $issLines = @(
            "[Setup]"
            "AppId={{A0FA4589-21AF-4EC3-9A9D-EEAEF77F013E}}"
            "AppName=RemoteMessage"
            "AppVersion=$versionName"
            "DefaultDirName={autopf}\\RemoteMessageClient"
            "DefaultGroupName=RemoteMessage"
            "OutputDir=$outputDir"
            "OutputBaseFilename=RemoteMessageClient-windows-x64-setup-$versionName-$versionCode"
            "Compression=lzma"
            "SolidCompression=yes"
            "ArchitecturesAllowed=x64compatible"
            "ArchitecturesInstallIn64BitMode=x64compatible"
            "WizardStyle=modern"
            ""
            "[Tasks]"
            "Name: ""desktopicon""; Description: ""Create a desktop shortcut""; GroupDescription: ""Additional icons:"""
            ""
            "[Files]"
            "Source: ""$releaseDir\\*""; DestDir: ""{app}""; Flags: ignoreversion recursesubdirs createallsubdirs"
            ""
            "[Icons]"
            "Name: ""{autoprograms}\\RemoteMessage""; Filename: ""{app}\\remotemessage.exe"""
            "Name: ""{autodesktop}\\RemoteMessage""; Filename: ""{app}\\remotemessage.exe""; Tasks: desktopicon"
          )
          $issLines | Set-Content -Path $issPath -Encoding UTF8

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" $issPath

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows-client
          path: release-assets/windows/*

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --project-name remotemessage --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts flutter_secure_storage image zxing2 mobile_scanner

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Configure client app identity
        run: python client/configure_client_app_identity.py client/flutter_client_build

      - name: Ensure Android network permissions
        shell: bash
        run: |
          set -euo pipefail
          manifest="client/flutter_client_build/android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.INTERNET" />' "$manifest"
          fi
          if ! grep -q "android.permission.ACCESS_NETWORK_STATE" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$manifest"
          fi
          if ! grep -q "android.permission.READ_CONTACTS" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.READ_CONTACTS" />' "$manifest"
          fi
          if ! grep -q "android.permission.CAMERA" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.CAMERA" />' "$manifest"
          fi

      - name: Prepare stable Android signing
        shell: bash
        env:
          ANDROID_CLIENT_KEYSTORE_BASE64: ${{ secrets.ANDROID_CLIENT_KEYSTORE_BASE64 }}
          ANDROID_CLIENT_KEY_ALIAS: ${{ secrets.ANDROID_CLIENT_KEY_ALIAS }}
          ANDROID_CLIENT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEYSTORE_PASSWORD }}
          ANDROID_CLIENT_KEY_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEY_PASSWORD }}
          ANDROID_GATEWAY_KEYSTORE_BASE64: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_BASE64 }}
          ANDROID_GATEWAY_KEY_ALIAS: ${{ secrets.ANDROID_GATEWAY_KEY_ALIAS }}
          ANDROID_GATEWAY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_PASSWORD }}
          ANDROID_GATEWAY_KEY_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_BASE64="${ANDROID_CLIENT_KEYSTORE_BASE64:-${ANDROID_GATEWAY_KEYSTORE_BASE64:-}}"
          KEY_ALIAS="${ANDROID_CLIENT_KEY_ALIAS:-${ANDROID_GATEWAY_KEY_ALIAS:-}}"
          KEYSTORE_PASSWORD="${ANDROID_CLIENT_KEYSTORE_PASSWORD:-${ANDROID_GATEWAY_KEYSTORE_PASSWORD:-}}"
          KEY_PASSWORD="${ANDROID_CLIENT_KEY_PASSWORD:-${ANDROID_GATEWAY_KEY_PASSWORD:-}}"
          if [ -z "${KEYSTORE_BASE64}" ] || [ -z "${KEY_ALIAS}" ] || [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_PASSWORD}" ]; then
            echo "::error::Missing signing secrets. Set ANDROID_CLIENT_* (preferred) or ANDROID_GATEWAY_* as fallback."
            exit 1
          fi

          mkdir -p client/flutter_client_build/android/app
          echo "$KEYSTORE_BASE64" | base64 -d > client/flutter_client_build/android/app/ci-signing.jks
          {
            echo "ANDROID_SIGNING_KEY_ALIAS=${KEY_ALIAS}"
            echo "ANDROID_SIGNING_KEY_PASSWORD=${KEY_PASSWORD}"
            echo "ANDROID_SIGNING_STORE_PASSWORD=${KEYSTORE_PASSWORD}"
            echo "ANDROID_SIGNING_STORE_FILE=ci-signing.jks"
          } >> "$GITHUB_ENV"

          if [ -f client/flutter_client_build/android/app/build.gradle.kts ]; then
            cat >> client/flutter_client_build/android/app/build.gradle.kts <<'EOF'

          val releaseSigningKeyAlias = System.getenv("ANDROID_SIGNING_KEY_ALIAS")
          val releaseSigningKeyPassword = System.getenv("ANDROID_SIGNING_KEY_PASSWORD")
          val releaseSigningStorePassword = System.getenv("ANDROID_SIGNING_STORE_PASSWORD")
          val releaseSigningStoreFile = System.getenv("ANDROID_SIGNING_STORE_FILE") ?: "ci-signing.jks"

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = releaseSigningKeyAlias
                      keyPassword = releaseSigningKeyPassword
                      storeFile = file(releaseSigningStoreFile)
                      storePassword = releaseSigningStorePassword
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          elif [ -f client/flutter_client_build/android/app/build.gradle ]; then
            cat >> client/flutter_client_build/android/app/build.gradle <<'EOF'

          def releaseSigningKeyAlias = System.getenv('ANDROID_SIGNING_KEY_ALIAS')
          def releaseSigningKeyPassword = System.getenv('ANDROID_SIGNING_KEY_PASSWORD')
          def releaseSigningStorePassword = System.getenv('ANDROID_SIGNING_STORE_PASSWORD')
          def releaseSigningStoreFile = System.getenv('ANDROID_SIGNING_STORE_FILE') ?: 'ci-signing.jks'

          android {
              signingConfigs {
                  release {
                      keyAlias releaseSigningKeyAlias
                      keyPassword releaseSigningKeyPassword
                      storeFile file(releaseSigningStoreFile)
                      storePassword releaseSigningStorePassword
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          else
            echo "::error::Cannot find Android app gradle file in generated Flutter project."
            exit 1
          fi

      - name: Build signed release APK
        working-directory: client/flutter_client_build
        run: flutter build apk --release --build-number ${{ inputs.version_code }} --build-name ${{ inputs.version_name }}

      - name: Pack Android APK
        shell: bash
        run: |
          set -euo pipefail
          asset="RemoteMessageClient-android-${{ inputs.version_name }}-${{ inputs.version_code }}.apk"
          cp client/flutter_client_build/build/app/outputs/flutter-apk/app-release.apk "$asset"
          mkdir -p release-assets/android
          mv "$asset" release-assets/android/

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-client
          path: release-assets/android/*

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --project-name remotemessage --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts flutter_secure_storage image zxing2 mobile_scanner

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Configure client app identity
        run: python client/configure_client_app_identity.py client/flutter_client_build

      - name: Ensure iOS camera usage description
        shell: bash
        run: |
          set -euo pipefail
          plist="client/flutter_client_build/ios/Runner/Info.plist"
          if ! /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$plist" >/dev/null 2>&1; then
            /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Scan onboarding QR codes" "$plist"
          fi

      - name: Set iOS deployment target to 15.0
        shell: bash
        run: |
          set -euo pipefail
          podfile="client/flutter_client_build/ios/Podfile"
          pbxproj="client/flutter_client_build/ios/Runner.xcodeproj/project.pbxproj"
          appframework_plist="client/flutter_client_build/ios/Flutter/AppFrameworkInfo.plist"

          if grep -qE '^platform :ios' "$podfile"; then
            sed -i "s/^platform :ios.*/platform :ios, '15.0'/" "$podfile"
          elif grep -qE '^# platform :ios' "$podfile"; then
            sed -i "s/^# platform :ios.*/platform :ios, '15.0'/" "$podfile"
          else
            printf "platform :ios, '15.0'\n%s" "$(cat "$podfile")" > "$podfile"
          fi

          perl -0777 -i -pe "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" "$pbxproj"
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 15.0" "$appframework_plist" || true

      - name: Build iOS (no codesign)
        working-directory: client/flutter_client_build
        run: flutter build ios --no-codesign

      - name: Pack unsigned IPA from Runner.app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p client/flutter_client_build/Payload
          cp -R client/flutter_client_build/build/ios/iphoneos/Runner.app client/flutter_client_build/Payload/Runner.app
          cd client/flutter_client_build
          zip -r "RemoteMessageClient-ios-unsigned-${{ inputs.version_name }}-${{ inputs.version_code }}.ipa" Payload
          mkdir -p ../../release-assets/ios
          mv "RemoteMessageClient-ios-unsigned-${{ inputs.version_name }}-${{ inputs.version_code }}.ipa" ../../release-assets/ios/

      - uses: actions/upload-artifact@v4
        with:
          name: release-ios-client
          path: release-assets/ios/*

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-android, build-ios]
    steps:
      - name: Download all build assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_name }}
          name: ${{ inputs.version_name }}
          prerelease: true
          append_body: true
          body: |
            - Client release
            - Version code: ${{ inputs.version_code }}
          files: |
            release-assets/**/*
          fail_on_unmatched_files: true
