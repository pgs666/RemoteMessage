name: android-gateway-release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g. Pre_0.0.1)"
        required: true
        default: "Pre_0.0.1"
      version_code:
        description: "Version code (integer)"
        required: true
        default: "1"

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Prepare stable signing keystore
        shell: bash
        env:
          ANDROID_GATEWAY_KEYSTORE_BASE64: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p android_gateway/signing
          echo "$ANDROID_GATEWAY_KEYSTORE_BASE64" | base64 -d > android_gateway/signing/ci-signing.jks

      - name: Build Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android_gateway/signing/ci-signing.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_GATEWAY_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEY_PASSWORD }}
          ANDROID_GATEWAY_VERSION_CODE: ${{ inputs.version_code }}
          ANDROID_GATEWAY_VERSION_NAME: ${{ inputs.version_name }}
        run: gradle -p android_gateway :app:assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-gateway-release-apk-v${{ inputs.version_name }}-${{ inputs.version_code }}
          path: android_gateway/app/build/outputs/apk/release/*.apk
