name: flutter-client-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build deps (GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build Linux
        working-directory: client/flutter_client_build
        run: flutter build linux

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-linux
          path: client/flutter_client_build/build/linux/x64/release/bundle

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: pwsh
        run: |
          Remove-Item -LiteralPath client/flutter_client_build/lib -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path client/flutter_client_build/lib -Force | Out-Null
          Copy-Item -Path client/flutter_client_source/lib/* -Destination client/flutter_client_build/lib -Recurse -Force

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build Windows
        working-directory: client/flutter_client_build
        run: flutter build windows

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-windows
          path: client/flutter_client_build/build/windows/x64/runner/Release

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Ensure Android network permissions
        shell: bash
        run: |
          set -euo pipefail
          manifest="client/flutter_client_build/android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.INTERNET" />' "$manifest"
          fi
          if ! grep -q "android.permission.ACCESS_NETWORK_STATE" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' "$manifest"
          fi
          if ! grep -q "android.permission.READ_CONTACTS" "$manifest"; then
            sed -i '/<manifest[^>]*>/a\    <uses-permission android:name="android.permission.READ_CONTACTS" />' "$manifest"
          fi

      - name: Prepare stable Android signing
        shell: bash
        env:
          ANDROID_CLIENT_KEYSTORE_BASE64: ${{ secrets.ANDROID_CLIENT_KEYSTORE_BASE64 }}
          ANDROID_CLIENT_KEY_ALIAS: ${{ secrets.ANDROID_CLIENT_KEY_ALIAS }}
          ANDROID_CLIENT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEYSTORE_PASSWORD }}
          ANDROID_CLIENT_KEY_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEY_PASSWORD }}
          ANDROID_GATEWAY_KEYSTORE_BASE64: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_BASE64 }}
          ANDROID_GATEWAY_KEY_ALIAS: ${{ secrets.ANDROID_GATEWAY_KEY_ALIAS }}
          ANDROID_GATEWAY_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEYSTORE_PASSWORD }}
          ANDROID_GATEWAY_KEY_PASSWORD: ${{ secrets.ANDROID_GATEWAY_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE_BASE64="${ANDROID_CLIENT_KEYSTORE_BASE64:-${ANDROID_GATEWAY_KEYSTORE_BASE64:-}}"
          KEY_ALIAS="${ANDROID_CLIENT_KEY_ALIAS:-${ANDROID_GATEWAY_KEY_ALIAS:-}}"
          KEYSTORE_PASSWORD="${ANDROID_CLIENT_KEYSTORE_PASSWORD:-${ANDROID_GATEWAY_KEYSTORE_PASSWORD:-}}"
          KEY_PASSWORD="${ANDROID_CLIENT_KEY_PASSWORD:-${ANDROID_GATEWAY_KEY_PASSWORD:-}}"
          if [ -z "${KEYSTORE_BASE64}" ] || [ -z "${KEY_ALIAS}" ] || [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_PASSWORD}" ]; then
            echo "::error::Missing signing secrets. Set ANDROID_CLIENT_* (preferred) or ANDROID_GATEWAY_* as fallback."
            exit 1
          fi

          mkdir -p client/flutter_client_build/android/app
          echo "$KEYSTORE_BASE64" | base64 -d > client/flutter_client_build/android/app/ci-signing.jks
          {
            echo "ANDROID_SIGNING_KEY_ALIAS=${KEY_ALIAS}"
            echo "ANDROID_SIGNING_KEY_PASSWORD=${KEY_PASSWORD}"
            echo "ANDROID_SIGNING_STORE_PASSWORD=${KEYSTORE_PASSWORD}"
            echo "ANDROID_SIGNING_STORE_FILE=ci-signing.jks"
          } >> "$GITHUB_ENV"

          if [ -f client/flutter_client_build/android/app/build.gradle.kts ]; then
            cat >> client/flutter_client_build/android/app/build.gradle.kts <<'EOF'

          val releaseSigningKeyAlias = System.getenv("ANDROID_SIGNING_KEY_ALIAS")
          val releaseSigningKeyPassword = System.getenv("ANDROID_SIGNING_KEY_PASSWORD")
          val releaseSigningStorePassword = System.getenv("ANDROID_SIGNING_STORE_PASSWORD")
          val releaseSigningStoreFile = System.getenv("ANDROID_SIGNING_STORE_FILE") ?: "ci-signing.jks"

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = releaseSigningKeyAlias
                      keyPassword = releaseSigningKeyPassword
                      storeFile = file(releaseSigningStoreFile)
                      storePassword = releaseSigningStorePassword
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          elif [ -f client/flutter_client_build/android/app/build.gradle ]; then
            cat >> client/flutter_client_build/android/app/build.gradle <<'EOF'

          def releaseSigningKeyAlias = System.getenv('ANDROID_SIGNING_KEY_ALIAS')
          def releaseSigningKeyPassword = System.getenv('ANDROID_SIGNING_KEY_PASSWORD')
          def releaseSigningStorePassword = System.getenv('ANDROID_SIGNING_STORE_PASSWORD')
          def releaseSigningStoreFile = System.getenv('ANDROID_SIGNING_STORE_FILE') ?: 'ci-signing.jks'

          android {
              signingConfigs {
                  release {
                      keyAlias releaseSigningKeyAlias
                      keyPassword releaseSigningKeyPassword
                      storeFile file(releaseSigningStoreFile)
                      storePassword releaseSigningStorePassword
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          else
            echo "::error::Cannot find Android app gradle file in generated Flutter project."
            exit 1
          fi

      - name: Build signed release APK
        working-directory: client/flutter_client_build
        run: flutter build apk --release --build-number $GITHUB_RUN_NUMBER --build-name ci.$GITHUB_RUN_NUMBER

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-android-release-apk
          path: client/flutter_client_build/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector flutter_contacts

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        shell: bash
        run: |
          rm -rf client/flutter_client_build/lib
          mkdir -p client/flutter_client_build/lib
          cp -R client/flutter_client_source/lib/. client/flutter_client_build/lib/

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build iOS (no codesign)
        working-directory: client/flutter_client_build
        run: flutter build ios --no-codesign

      - name: Archive iOS app directory (no-codesign)
        run: |
          cd client/flutter_client_build/build/ios/iphoneos
          zip -r ../../../../ios-no-codesign-app.zip Runner.app

      - name: Pack unsigned IPA from Runner.app
        run: |
          mkdir -p client/flutter_client_build/Payload
          cp -R client/flutter_client_build/build/ios/iphoneos/Runner.app client/flutter_client_build/Payload/Runner.app
          cd client/flutter_client_build
          zip -r ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-no-codesign-app
          path: client/flutter_client_build/ios-no-codesign-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-unsigned-ipa
          path: client/flutter_client_build/ios-unsigned.ipa
