name: flutter-client-ci

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build deps (GTK)
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        run: cp client/flutter_client_source/lib/main.dart client/flutter_client_build/lib/main.dart

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build Linux
        working-directory: client/flutter_client_build
        run: flutter build linux

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-linux
          path: client/flutter_client_build/build/linux/x64/release/bundle

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        run: copy client\flutter_client_source\lib\main.dart client\flutter_client_build\lib\main.dart

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build Windows
        working-directory: client/flutter_client_build
        run: flutter build windows

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-windows
          path: client/flutter_client_build/build/windows/x64/runner/Release

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        run: cp client/flutter_client_source/lib/main.dart client/flutter_client_build/lib/main.dart

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Prepare stable Android signing
        shell: bash
        env:
          ANDROID_CLIENT_KEYSTORE_BASE64: ${{ secrets.ANDROID_CLIENT_KEYSTORE_BASE64 }}
          ANDROID_CLIENT_KEY_ALIAS: ${{ secrets.ANDROID_CLIENT_KEY_ALIAS }}
          ANDROID_CLIENT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEYSTORE_PASSWORD }}
          ANDROID_CLIENT_KEY_PASSWORD: ${{ secrets.ANDROID_CLIENT_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for key in ANDROID_CLIENT_KEYSTORE_BASE64 ANDROID_CLIENT_KEY_ALIAS ANDROID_CLIENT_KEYSTORE_PASSWORD ANDROID_CLIENT_KEY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

          mkdir -p client/flutter_client_build/android/app
          echo "$ANDROID_CLIENT_KEYSTORE_BASE64" | base64 -d > client/flutter_client_build/android/app/ci-signing.jks
          cat > client/flutter_client_build/android/key.properties <<EOF
          storePassword=${ANDROID_CLIENT_KEYSTORE_PASSWORD}
          keyPassword=${ANDROID_CLIENT_KEY_PASSWORD}
          keyAlias=${ANDROID_CLIENT_KEY_ALIAS}
          storeFile=ci-signing.jks
          EOF

          if [ -f client/flutter_client_build/android/app/build.gradle.kts ]; then
            cat >> client/flutter_client_build/android/app/build.gradle.kts <<'EOF'

          val releaseKeystoreProperties = java.util.Properties().apply {
              val file = rootProject.file("key.properties")
              file.inputStream().use { load(it) }
          }

          android {
              signingConfigs {
                  create("release") {
                      keyAlias = releaseKeystoreProperties["keyAlias"] as String
                      keyPassword = releaseKeystoreProperties["keyPassword"] as String
                      storeFile = file(releaseKeystoreProperties["storeFile"] as String)
                      storePassword = releaseKeystoreProperties["storePassword"] as String
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          elif [ -f client/flutter_client_build/android/app/build.gradle ]; then
            cat >> client/flutter_client_build/android/app/build.gradle <<'EOF'

          def releaseKeystoreProperties = new Properties()
          def releaseKeystorePropertiesFile = rootProject.file('key.properties')
          releaseKeystoreProperties.load(new FileInputStream(releaseKeystorePropertiesFile))

          android {
              signingConfigs {
                  release {
                      keyAlias releaseKeystoreProperties['keyAlias']
                      keyPassword releaseKeystoreProperties['keyPassword']
                      storeFile file(releaseKeystoreProperties['storeFile'])
                      storePassword releaseKeystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          else
            echo "::error::Cannot find Android app gradle file in generated Flutter project."
            exit 1
          fi

      - name: Build signed release APK
        working-directory: client/flutter_client_build
        run: flutter build apk --release --build-number $GITHUB_RUN_NUMBER --build-name ci.$GITHUB_RUN_NUMBER

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-android-release-apk
          path: client/flutter_client_build/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter app skeleton
        run: flutter create --platforms=android,ios,linux,windows client/flutter_client_build

      - name: Add client dependencies
        run: |
          cd client/flutter_client_build
          flutter pub add path path_provider sqlite3 file_selector

      - name: Install icon generation dependency
        run: python -m pip install --upgrade pillow

      - name: Inject client source
        run: cp client/flutter_client_source/lib/main.dart client/flutter_client_build/lib/main.dart

      - name: Apply client app icons
        run: python client/apply_client_icons.py client/flutter_client_build client/icons

      - name: Build iOS (no codesign)
        working-directory: client/flutter_client_build
        run: flutter build ios --no-codesign

      - name: Archive iOS app directory (no-codesign)
        run: |
          cd client/flutter_client_build/build/ios/iphoneos
          zip -r ../../../../ios-no-codesign-app.zip Runner.app

      - name: Pack unsigned IPA from Runner.app
        run: |
          mkdir -p client/flutter_client_build/Payload
          cp -R client/flutter_client_build/build/ios/iphoneos/Runner.app client/flutter_client_build/Payload/Runner.app
          cd client/flutter_client_build
          zip -r ios-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-no-codesign-app
          path: client/flutter_client_build/ios-no-codesign-app.zip

      - uses: actions/upload-artifact@v4
        with:
          name: flutter-ios-unsigned-ipa
          path: client/flutter_client_build/ios-unsigned.ipa
